name: openai-oauth-api-service-prod

services:
  postgres:
    image: postgres:18
    container_name: "${PROJECT_SLUG:-openai-oauth-api-service}-postgres"
    restart: always
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-this-postgres-password}"
      POSTGRES_DB: "${POSTGRES_DB:-openai_oauth_api_service}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
    mem_limit: "${POSTGRES_MEM_LIMIT:-256m}"
    mem_reservation: "${POSTGRES_MEM_RESERVATION:-128m}"
    volumes:
      - "${POSTGRES_DATA_DIR:-/data/openai-oauth-api-service/postgres}:/var/lib/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks: {}

  app-server:
    image: "${APP_IMAGE:-openai-oauth-api-service-server:dev}"
    container_name: "${PROJECT_SLUG:-openai-oauth-api-service}-server"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_HTTP_PORT:-8400}:8400"
      - "${APP_GRPC_PORT:-9400}:9400"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      # 设计意图：默认 DSN 必须与本项目 prod 配置保持一致，避免 .env 未显式覆盖时误连占位库名或占位密码。
      POSTGRES_DSN: "${POSTGRES_DSN:-postgres://postgres:change-this-postgres-password@postgres:5432/openai_oauth_api_service?sslmode=disable}"
      TRACE_ENDPOINT: "${TRACE_ENDPOINT:-}"
      OAUTH_API_JWT_SECRET: "${OAUTH_API_JWT_SECRET:-change-this-jwt-secret}"
      OAUTH_API_ADMIN_USERNAME: "${OAUTH_API_ADMIN_USERNAME:-admin}"
      OAUTH_API_ADMIN_PASSWORD: "${OAUTH_API_ADMIN_PASSWORD:-adminadmin}"
      CODEX_HOME: "${CODEX_CONTAINER_HOME:-/root/.codex}"
      CODEX_UPSTREAM_MODE: "${CODEX_UPSTREAM_MODE:-codex_backend}"
      CODEX_UPSTREAM_FALLBACK_ENABLED: "${CODEX_UPSTREAM_FALLBACK_ENABLED:-false}"
      CODEX_CLI_BIN: "${CODEX_CLI_BIN:-codex}"
      CODEX_CLI_TIMEOUT_SECONDS: "${CODEX_CLI_TIMEOUT_SECONDS:-600}"
      CODEX_BACKEND_BASE_URL: "${CODEX_BACKEND_BASE_URL:-https://chatgpt.com/backend-api/codex}"
      CODEX_BACKEND_TIMEOUT_SECONDS: "${CODEX_BACKEND_TIMEOUT_SECONDS:-600}"
      CODEX_BACKEND_RETRY_ATTEMPTS: "${CODEX_BACKEND_RETRY_ATTEMPTS:-2}"
      CODEX_BACKEND_USER_AGENT: "${CODEX_BACKEND_USER_AGENT:-codex-cli}"
      CODEX_AUTH_FILE: "${CODEX_AUTH_FILE:-}"
      CODEX_REFRESH_TOKEN_URL_OVERRIDE: "${CODEX_REFRESH_TOKEN_URL_OVERRIDE:-}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      WS_PROXY: "${WS_PROXY:-}"
      WSS_PROXY: "${WSS_PROXY:-}"
      ALL_PROXY: "${ALL_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-}"
      http_proxy: "${http_proxy:-}"
      https_proxy: "${https_proxy:-}"
      ws_proxy: "${ws_proxy:-}"
      wss_proxy: "${wss_proxy:-}"
      all_proxy: "${all_proxy:-}"
      no_proxy: "${no_proxy:-}"
      NODE_USE_ENV_PROXY: "${NODE_USE_ENV_PROXY:-}"
      OAUTH_API_RATE_LIMIT_ENABLED: "${OAUTH_API_RATE_LIMIT_ENABLED:-true}"
      OAUTH_API_EXPORT_MAX_DAYS: "${OAUTH_API_EXPORT_MAX_DAYS:-90}"
      OAUTH_API_ALERT_RETENTION_DAYS: "${OAUTH_API_ALERT_RETENTION_DAYS:-30}"
      OAUTH_API_OAUTH_PROVIDER: "${OAUTH_API_OAUTH_PROVIDER:-google}"
      OAUTH_API_OAUTH_CLIENT_ID: "${OAUTH_API_OAUTH_CLIENT_ID:-}"
      OAUTH_API_OAUTH_CLIENT_SECRET: "${OAUTH_API_OAUTH_CLIENT_SECRET:-}"
      OAUTH_API_OAUTH_AUTH_URL: "${OAUTH_API_OAUTH_AUTH_URL:-}"
      OAUTH_API_OAUTH_TOKEN_URL: "${OAUTH_API_OAUTH_TOKEN_URL:-}"
      OAUTH_API_OAUTH_USERINFO_URL: "${OAUTH_API_OAUTH_USERINFO_URL:-}"
      OAUTH_API_OAUTH_SCOPES: "${OAUTH_API_OAUTH_SCOPES:-}"
      OAUTH_API_OAUTH_ALLOWED_FRONTEND_ORIGINS: "${OAUTH_API_OAUTH_ALLOWED_FRONTEND_ORIGINS:-}"
    mem_limit: "${APP_MEM_LIMIT:-160m}"
    mem_reservation: "${APP_MEM_RESERVATION:-80m}"
    volumes:
      - "${CODEX_HOST_HOME:-/root/.codex}:${CODEX_CONTAINER_HOME:-/root/.codex}"
    networks: {}
