name: openai-oauth-api-service-prod

services:
  postgres:
    image: postgres:18
    container_name: "${PROJECT_SLUG:-openai-oauth-api-service}-postgres"
    restart: always
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-this-postgres-password}"
      POSTGRES_DB: "${POSTGRES_DB:-openai_oauth_api_service}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
    mem_limit: "${POSTGRES_MEM_LIMIT:-256m}"
    mem_reservation: "${POSTGRES_MEM_RESERVATION:-128m}"
    volumes:
      - "${POSTGRES_DATA_DIR:-/data/openai-oauth-api-service/postgres}:/var/lib/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    networks: {}

  app-server:
    image: "${APP_IMAGE:-openai-oauth-api-service-server:dev}"
    container_name: "${PROJECT_SLUG:-openai-oauth-api-service}-server"
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_HTTP_PORT:-8400}:8400"
      - "${APP_GRPC_PORT:-9400}:9400"
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      # 设计意图：默认 DSN 必须与本项目 prod 配置保持一致，避免 .env 未显式覆盖时误连占位库名或占位密码。
      POSTGRES_DSN: "${POSTGRES_DSN:-postgres://postgres:change-this-postgres-password@postgres:5432/openai_oauth_api_service?sslmode=disable}"
      TRACE_ENDPOINT: "${TRACE_ENDPOINT:-}"
      OAUTH_API_JWT_SECRET: "${OAUTH_API_JWT_SECRET:-change-this-jwt-secret}"
      OAUTH_API_ADMIN_USERNAME: "${OAUTH_API_ADMIN_USERNAME:-admin}"
      OAUTH_API_ADMIN_PASSWORD: "${OAUTH_API_ADMIN_PASSWORD:-adminadmin}"
      OAUTH_API_UPSTREAM_PROVIDER: "${OAUTH_API_UPSTREAM_PROVIDER:-openai_api}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
      UPSTREAM_PROXY_URL: "${UPSTREAM_PROXY_URL:-}"
      CODEX_HOME: "${CODEX_CONTAINER_HOME:-/root/.codex}"
      CODEX_CLI_BIN: "${CODEX_CLI_BIN:-codex}"
      CODEX_CLI_TIMEOUT_SECONDS: "${CODEX_CLI_TIMEOUT_SECONDS:-600}"
      GATEWAY_RATE_LIMIT_ENABLED: "${GATEWAY_RATE_LIMIT_ENABLED:-true}"
      GATEWAY_EXPORT_MAX_DAYS: "${GATEWAY_EXPORT_MAX_DAYS:-90}"
      GATEWAY_MODEL_SYNC_TIMEOUT_SECONDS: "${GATEWAY_MODEL_SYNC_TIMEOUT_SECONDS:-30}"
      GATEWAY_ALERT_RETENTION_DAYS: "${GATEWAY_ALERT_RETENTION_DAYS:-30}"
    mem_limit: "${APP_MEM_LIMIT:-160m}"
    mem_reservation: "${APP_MEM_RESERVATION:-80m}"
    volumes:
      - "${CODEX_HOST_HOME:-/root/.codex}:${CODEX_CONTAINER_HOME:-/root/.codex}"
    networks: {}
