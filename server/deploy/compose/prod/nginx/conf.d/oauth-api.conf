server {
    listen 80;
    listen [::]:80;
    server_name oauth-api.saurick.me oauth-api.saurick.space openai.saurick.space;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name oauth-api.saurick.me;

    ssl_certificate /etc/nginx/certs/oauth-api.saurick.me/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/oauth-api.saurick.me/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://app-server:8400;
        include /etc/nginx/snippets/openai-oauth-api-service-proxy-common.conf;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name oauth-api.saurick.space;

    ssl_certificate /etc/nginx/certs/oauth-api.saurick.space/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/oauth-api.saurick.space/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    return 308 https://oauth-api.saurick.me$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name openai.saurick.space;

    ssl_certificate /etc/nginx/certs/openai.saurick.space/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/openai.saurick.space/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    return 308 https://oauth-api.saurick.me$request_uri;
}
